name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  isocalendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 3D Isometric Contribution Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: KHALIDMRJ
          template: classic
          base: ""
          config_timezone: Africa/Casablanca
          filename: metrics.isocalendar.svg
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
